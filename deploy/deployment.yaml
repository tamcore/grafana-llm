apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: grafana-llm
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.4.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-llm-config
                  key: admin-password
            - name: GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS
              value: tamcore-llmanalysis-app
          volumeMounts:
            - name: plugin-data
              mountPath: /var/lib/grafana/plugins/tamcore-llmanalysis-app
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: plugin-data
          emptyDir: {}
